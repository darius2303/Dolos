openapi: "3.0.3"
info:
  title: "Dolos Plagiarism Detection -- SOAP API (gSOAP mapping)"
  version: "2.0.0"
  description: |
    Documenteaza operatia SOAP expusa de serverul gSOAP al
    proiectului Dolos, conform definitiei din services/service.h.

    Namespace:  ns
    Protocol:   SOAP 1.1, stil RPC, encoding: encoded
    WSDL ns:    http://example.com/service.wsdl
    Schema ns:  urn:service

    Nota: fisierul service.h defineste o singura operatie:
      int ns__analyzeFiles(struct ns__ArrayOfFiles files, char **report)
    Nu exista autentificare, inregistrare sau login in API-ul curent.

servers:
  - url: "http://{host}:{port}"
    description: "Endpoint gSOAP server (din client.cfg)"
    variables:
      host:
        default: "localhost"
      port:
        default: "8080"

paths:

  /soap#ns__analyzeFiles:
    post:
      operationId: ns__analyzeFiles
      summary: "Analiza fisiere pentru detectare plagiat"
      description: |
        Operatie SOAP: ns__analyzeFiles(struct ns__ArrayOfFiles files,
                                        char **report)

        Primeste un array de fisiere (fiecare cu nume si continut binar
        encodat base64), le compara intre ele si returneaza un raport
        de similaritate in format text (similar cu output-ul MOSS).

        Exemplu raport:
          === Raport Detectare Plagiat ===
          Fisiere analizate: 3

          stack_original.c <-> stack_palg.c  : 59.9%
          stack_original.c <-> other_stack.c :  4.0%
          stack_palg.c     <-> other_stack.c :  1.0%

        Implementare: server/server.c -> ns__analyzeFiles()
        Apel client:  soap_call_ns__analyzeFiles()
        Flagul CLI:   client -f <fisier1> -f <fisier2> ...
      requestBody:
        required: true
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AnalyzeFilesRequest"
            example:
              files:
                - filename: "stack_original.c"
                  data:
                    __ptr: "<continut binar>"
                    __size: 1024
                - filename: "stack_palg.c"
                  data:
                    __ptr: "<continut binar>"
                    __size: 980
                - filename: "other_stack.c"
                  data:
                    __ptr: "<continut binar>"
                    __size: 512
      responses:
        "200":
          description: "SOAP_OK -- raport de similaritate returnat"
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AnalyzeFilesResponse"
              example:
                report: |
                  === Raport Detectare Plagiat ===
                  Fisiere analizate: 3

                  stack_original.c <-> stack_palg.c  : 59.9%
                  stack_original.c <-> other_stack.c :  4.0%
                  stack_palg.c     <-> other_stack.c :  1.0%
        "500":
          description: "SOAP Fault (eroare interna, fisiere invalide)"
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/SoapFault"

components:
  schemas:

    xsd__base64Binary:
      type: object
      description: |
        Corespunde struct xsd__base64Binary din service.h.
        Reprezinta date binare encodate in base64, cu metadate MIME
        optionale (id, type, options).
      required:
        - __ptr
        - __size
      properties:
        __ptr:
          type: string
          format: byte
          description: "Datele binare encodate base64 (continutul fisierului)"
        __size:
          type: integer
          description: "Dimensiunea datelor in bytes"
        id:
          type: string
          nullable: true
          description: "Identificator optional"
        type:
          type: string
          nullable: true
          description: "Tipul MIME optional (ex: text/x-csrc)"
        options:
          type: string
          nullable: true
          description: "Optiuni aditionale"

    ns__FileItem:
      type: object
      description: |
        Corespunde struct ns__FileItem din service.h.
        Un fisier cu numele sau si continutul binar encodat base64.
      required:
        - filename
        - data
      properties:
        filename:
          type: string
          description: "Numele fisierului (ex: tema1.c)"
          example: "stack_original.c"
        data:
          $ref: "#/components/schemas/xsd__base64Binary"

    ns__ArrayOfFiles:
      type: object
      description: |
        Corespunde struct ns__ArrayOfFiles din service.h.
        Array de fisiere trimise spre analiza. Campul __size reflecta
        numarul de elemente din __ptr.
      required:
        - __ptr
        - __size
      properties:
        __ptr:
          type: array
          items:
            $ref: "#/components/schemas/ns__FileItem"
          description: "Array-ul de fisiere"
        __size:
          type: integer
          description: "Numarul de fisiere din array"
          example: 3

    AnalyzeFilesRequest:
      type: object
      description: "Corpul SOAP request pentru ns__analyzeFiles"
      required:
        - files
      properties:
        files:
          $ref: "#/components/schemas/ns__ArrayOfFiles"

    AnalyzeFilesResponse:
      type: object
      description: "Corpul SOAP response pentru ns__analyzeFiles"
      properties:
        report:
          type: string
          description: |
            Raportul de similaritate in format text.
            Contine procentajele de similaritate pentru fiecare pereche
            de fisiere analizate.

    SoapFault:
      type: object
      description: "SOAP Fault returnat in caz de eroare"
      properties:
        faultcode:
          type: string
          example: "SOAP-ENV:Server"
        faultstring:
          type: string
          example: "Eroare interna la procesarea fisierelor"
        detail:
          type: string
          example: "Numarul de fisiere trebuie sa fie >= 2"